<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f5f5f5"/>
  
  <!-- Drill Shape -->
  <g transform="translate(100, 80)">
    <!-- Battery -->
    <rect x="0" y="200" width="50" height="80" rx="5" fill="#1e40af" stroke="#000" stroke-width="2"/>
    <rect x="5" y="205" width="40" height="15" fill="#3b82f6"/>
    
    <!-- Motor Housing -->
    <circle cx="125" cy="120" r="45" fill="#dc2626" stroke="#000" stroke-width="2"/>
    <circle cx="125" cy="120" r="35" fill="#991b1b"/>
    
    <!-- Chuck -->
    <circle cx="125" cy="60" r="25" fill="#333" stroke="#000" stroke-width="2"/>
    <circle cx="125" cy="60" r="15" fill="#666"/>
    <rect x="120" y="45" width="10" height="10" fill="#999"/>
    <rect x="120" y="65" width="10" height="10" fill="#999"/>
    
    <!-- Bit -->
    <rect x="122" y="20" width="6" height="40" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
    <polygon points="122,15 128,15 125,10" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
    
    <!-- Handle Grip -->
    <path d="M 80 200 Q 75 230 90 260 L 100 260 Q 85 230 90 200 Z" fill="#333" stroke="#000" stroke-width="2"/>
    <path d="M 80 200 L 95 200 L 95 260 L 85 260 Z" fill="#555" stroke="#000" stroke-width="2"/>
    
    <!-- Trigger -->
    <path d="M 95 210 L 140 220 L 140 240 L 95 240 Z" fill="#666" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">
    Makita 18V Drill
  </text>
</svg>