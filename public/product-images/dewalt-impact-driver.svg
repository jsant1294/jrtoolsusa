<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f5f5f5"/>
  
  <!-- Impact Driver Shape -->
  <g transform="translate(80, 80)">
    <!-- Battery Pack -->
    <rect x="0" y="180" width="60" height="100" rx="8" fill="#fbbf24" stroke="#000" stroke-width="2"/>
    <rect x="8" y="190" width="44" height="20" fill="#f59e0b"/>
    <circle cx="15" cy="220" r="4" fill="#000"/>
    <circle cx="30" cy="220" r="4" fill="#000"/>
    <circle cx="45" cy="220" r="4" fill="#000"/>
    
    <!-- Motor Housing -->
    <rect x="50" y="80" width="100" height="120" rx="10" fill="#eab308" stroke="#000" stroke-width="2"/>
    <rect x="60" y="95" width="80" height="90" fill="#facc15" rx="5"/>
    
    <!-- Hexagonal Chuck -->
    <circle cx="150" cy="50" r="30" fill="#333" stroke="#000" stroke-width="2"/>
    <circle cx="150" cy="50" r="20" fill="#555"/>
    <!-- Hex pattern -->
    <polygon points="150,35 165,42 165,58 150,65 135,58 135,42" fill="#777" stroke="#000" stroke-width="1"/>
    
    <!-- Bit/Socket -->
    <rect x="147" y="10" width="6" height="35" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
    <rect x="145" y="5" width="10" height="8" fill="#a8a8a8" stroke="#000" stroke-width="1"/>
    
    <!-- Trigger Handle -->
    <path d="M 55 85 L 45 180 L 55 200 L 70 180 Z" fill="#333" stroke="#000" stroke-width="2"/>
    <ellipse cx="55" cy="130" rx="8" ry="20" fill="#555"/>
    
    <!-- Side Grip -->
    <rect x="20" y="140" width="25" height="50" rx="5" fill="#666" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">
    DeWalt Impact Driver
  </text>
</svg>